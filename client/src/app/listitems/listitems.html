<h2 class="mb-3">Cars</h2>

<p class="text-muted">Total items: {{ itemsApi.items().length }}</p>

<div *ngIf="itemsApi.items().length === 0" class="alert alert-secondary">No items found.</div>

<div class="row g-3">
  <div class="col-md-6 col-lg-4" *ngFor="let car of itemsApi.items()">
    <div class="card h-100 shadow-sm">
      <img [src]="car.image" class="card-img-top" alt="{{ car.make }} {{ car.model }}" />
      <div class="card-body">
        <h5 class="card-title">{{ car.make }} {{ car.model }}</h5>
        <p class="card-text">Year: {{ car.year }}</p>
      </div>
      <div class="card-footer bg-white border-0">
        <button class="btn btn-danger w-100" (click)="deleteItem(car._id!)">Delete</button>
      </div>
    </div>
  </div>
</div>
